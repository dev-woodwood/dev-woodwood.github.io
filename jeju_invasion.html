<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>체계적인 제주 침공 🏝️ — 여행 일정</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --bg: #f4f6f8; --panel: #ffffff; --line: #e3e8ee;
    --ink: #1d2733; --muted: #6b7785; --accent: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", Roboto, sans-serif;
    color: var(--ink); background: var(--bg);
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 13px 18px;
    background: linear-gradient(135deg, #ff6b6b, #ffa36b);
    color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.12); z-index: 1000;
  }
  header h1 { margin: 0; font-size: 1.25rem; letter-spacing: -.3px; }
  header p { margin: 4px 0 0; font-size: .8rem; opacity: .92; }
  .wrap { flex: 1; display: flex; min-height: 0; }
  #sidebar { width: 384px; background: var(--panel); border-right: 1px solid var(--line); overflow-y: auto; }
  #map { flex: 1; min-width: 0; }

  .tabs { position: sticky; top: 0; background: var(--panel); padding: 10px 12px; border-bottom: 1px solid var(--line); display: flex; gap: 6px; z-index: 5; }
  .tab { flex: 1; text-align: center; padding: 7px 4px; border-radius: 8px; border: 1px solid var(--line); background: #fff; cursor: pointer; font-size: .82rem; font-weight: 600; color: var(--muted); transition: .15s; }
  .tab.active { color: #fff; border-color: transparent; }
  .tab small { display: block; font-weight: 500; font-size: .66rem; opacity: .8; margin-top: 1px; }

  .daycard { padding: 12px; border-bottom: 8px solid var(--bg); }
  .dayhead { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
  .daypill { color: #fff; font-weight: 700; font-size: .8rem; padding: 3px 10px; border-radius: 20px; }
  .daysub { font-size: .78rem; color: var(--muted); }

  .stop { display: flex; gap: 10px; padding: 3px 0; }
  .stop .time { width: 44px; flex: none; font-size: .72rem; color: var(--muted); padding-top: 11px; text-align: right; font-variant-numeric: tabular-nums; }
  .stop .rail { width: 26px; flex: none; display: flex; flex-direction: column; align-items: center; }
  .stop .num { width: 24px; height: 24px; border-radius: 50%; color: #fff; font-size: .78rem; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 9px; box-shadow: 0 1px 3px rgba(0,0,0,.25); }
  .stop .meal-ico { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; margin-top: 9px; font-size: 1rem; }
  .stop .line { flex: 1; width: 2px; background: var(--line); margin: 2px 0; }
  .stop:last-child .line { display: none; }

  .card { flex: 1; min-width: 0; margin: 5px 0; }
  .meal { flex: 1; min-width: 0; margin: 5px 0; padding: 8px 11px; background: #fffaf3; border: 1px dashed #f0c98a; border-radius: 9px; font-size: .83rem; color: #6b5836; }
  .meal.clk { cursor: pointer; }
  .meal.clk:hover { background: #fff3e0; }
  .meal b { color: #b9762a; }
  .meal .alt { display:block; margin-top:3px; font-size:.72rem; color:#9a8a72; }
  .lvl { display:inline-block; font-size:.66rem; font-weight:700; padding:1px 6px; border-radius:9px; margin-right:5px; vertical-align:1px; }
  .lvl.light { background:#e3f6ec; color:#1f9d63; }
  .lvl.heavy { background:#fde6d8; color:#cc5e22; }
  .lvl.snack { background:#ece4f7; color:#7a5bb0; }
  .swim-badge { font-size:.66rem; font-weight:700; color:#fff; background:#1e90ff; padding:1px 7px; border-radius:10px; }
  .place-card { border: 1px solid var(--line); border-radius: 11px; padding: 9px 11px; background: #fff; cursor: pointer; transition: .15s; }
  .place-card:hover { border-color: var(--accent); background: #fff7f6; transform: translateY(-1px); }
  .pc-top { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .pc-cat { font-size: .68rem; color: #fff; padding: 1px 7px; border-radius: 10px; }
  .pc-name { font-weight: 700; font-size: .92rem; }
  .pc-note { font-size: .76rem; color: var(--muted); margin-top: 4px; line-height: 1.4; }
  .pc-dir { display: inline-block; margin-top: 7px; font-size: .73rem; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); border-radius: 6px; padding: 2px 8px; }
  .pc-dir:hover { background: var(--accent); color: #fff; }

  .extras { padding: 12px; }
  .extras h3 { margin: 4px 0 8px; font-size: .9rem; }
  .extras .grp { font-size: .76rem; color: var(--muted); margin: 8px 0 3px; font-weight: 700; }
  .extras .it { font-size: .8rem; padding: 3px 0; border-bottom: 1px dotted var(--line); }

  .leaflet-popup-content { font-size: .85rem; }
  .pop-cat { display:inline-block; font-size:.7rem; color:#fff; padding:1px 7px; border-radius:10px; margin-bottom:4px; }
  .num-marker { border-radius:50%; color:#fff; font-weight:700; font-size:.8rem; display:flex; align-items:center; justify-content:center; border:2px solid #fff; box-shadow:0 2px 5px rgba(0,0,0,.4); }

  @media (max-width: 720px) {
    .wrap { flex-direction: column; }
    #sidebar { width: 100%; max-height: 48%; border-right: none; border-bottom: 1px solid var(--line); }
  }
</style>
</head>
<body>
<header>
  <h1>🏝️ 체계적인 제주 침공</h1>
  <p>목·금·토 (일요일 복귀) · 하루 1곳에서 물놀이 2시간 · 점심=라이트 / 저녁=든든</p>
</header>
<div class="wrap">
  <div id="sidebar">
    <div class="tabs" id="tabs"></div>
    <div id="days"></div>
    <div class="extras" id="extras"></div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const HOME = { n: "숙소 (한림권)", lat: 33.3482824, lng: 126.2839176 };

const DAYS = [
  {
    key: "목", label: "목요일", sub: "서부 (한림·애월·사계) · 물놀이 한 곳에서 푹", color: "#0984e3",
    stops: [
      { t: "08:30", k: "meal", lvl: "라이트", n: "아침 — 똣똣라면 본점", note: "라멘 (금오름·숙소 옆)", lat: 33.3586969, lng: 126.2966655, alt: "숙소 근처에서 든든히 출발" },
      { t: "09:30", k: "p", cat: "호핑투어", e: "🚤", n: "제주해양레저 사계", lat: 33.2281761, lng: 126.3058357, note: "오전 보트투어·스노클 (예약·출항시간 확인)" },
      { t: "12:30", k: "meal", lvl: "라이트", n: "점심 — (추후 결정)", alt: "직접 찾는 중 — 정해지면 알려주시면 넣어드릴게요" },
      { t: "14:00", k: "p", cat: "카트", e: "🏎️", n: "9.81파크 (애월)", lat: 33.4197, lng: 126.3711, note: "무동력 레이싱 카트 + 액티비티 (애월 중산간)" },
      { t: "16:00", k: "p", main: true, cat: "물놀이", e: "🌊", n: "판포포구", lat: 33.3653292, lng: 126.1997151, note: "오늘의 메인 물놀이 — 에메랄드빛 천연 수영장에서 2시간 푹" },
      { t: "18:30", k: "meal", lvl: "든든", n: "저녁 — 회 + α", note: "하나로마트 대정농협에서 회·저녁거리 픽업 (호핑·사계 근처라 오전에 사두면 편함)", lat: 33.2340049, lng: 126.2641931, alt: "숙소에서 회 파티 🍣" },
    ],
  },
  {
    key: "금", label: "금요일", sub: "중·동부 숲·동굴 + 김녕 물놀이", color: "#00b894",
    stops: [
      { t: "08:30", k: "meal", lvl: "라이트", n: "아침 — 정성듬뿍제주국", note: "맑은 각재기국", lat: 33.5140406, lng: 126.5202577, alt: "제주시 원도심, 동쪽 출발 길목" },
      { t: "10:00", k: "p", cat: "트레킹", e: "🥾", n: "더 포레스트 편백숲마을", lat: 33.4600982, lng: 126.6549633, note: "피톤치드 숲 트레킹 (가볍게)" },
      { t: "11:30", k: "meal", lvl: "든든", n: "점심 — 백마가든", note: "최고의 말고기 (조천)", lat: 33.5052823, lng: 126.6243914, alt: "물놀이 전에 든든하게" },
      { t: "13:00", k: "p", cat: "트레킹", e: "🕳️", n: "만장굴", lat: 33.5282463, lng: 126.7702874, note: "세계자연유산 용암동굴 (시원·우천 OK)" },
      { t: "14:00", k: "p", main: true, cat: "물놀이", e: "🌊", n: "세기알해변", lat: 33.558169, lng: 126.7553943, note: "오늘의 메인 물놀이 — 김녕, 인기 많고 활기찬 에메랄드빛에서 2시간 (만장굴 옆)" },
      { t: "16:30", k: "meal", lvl: "간식", n: "간식 — 금호정육점", note: "막창순대 (제주시 원도심, 출출할 때 가볍게)", lat: 33.5145409, lng: 126.5318942, alt: "복귀길 간식" },
      { t: "19:00", k: "meal", lvl: "든든", n: "저녁 — 제주시 근고기/흑돼지", alt: "제대로 된 한 끼 (복귀길 제주시·자유) — 원하는 가게 알려주시면 넣어드려요" },
    ],
  },
  {
    key: "토", label: "토요일", sub: "아침 금오름 → 동부 끝 (구좌) 여유로운 날", color: "#e17055",
    stops: [
      { t: "08:00", k: "p", cat: "트레킹", e: "🥾", n: "금오름", lat: 33.355577, lng: 126.3056877, note: "아침 오름 트레킹 — 숙소 10분, 분화구 전망 (시원할 때)" },
      { t: "09:30", k: "meal", lvl: "라이트", n: "아침 — 효퇴국수", note: "고기국수 (금오름 후 제주시)", lat: 33.5015363, lng: 126.5196628, alt: "대체: 파도식당 고기국수" },
      { t: "11:30", k: "p", main: true, cat: "물놀이", e: "🌊", n: "신양섭지코지해수욕장", lat: 33.4256, lng: 126.9293, note: "오늘의 메인 물놀이 — 성산 섭지코지 옆, 윈드서핑·젊은층 북적이는 핫플 2시간" },
      { t: "13:30", k: "meal", lvl: "든든", n: "점심 — 소금바치 순이네", note: "돌문어볶음 (제육 느낌, 하도·종달 옆)", lat: 33.5035471, lng: 126.9127463, alt: "물놀이 끝나고 바로 옆에서" },
      { t: "15:00", k: "p", cat: "산책", e: "🚶", n: "세화·종달 마을 산책", lat: 33.5246, lng: 126.8597, note: "오후 자유 — 해안 카페·소품샵 (물놀이 더 원하면 평대/세기알)" },
      { t: "18:00", k: "meal", lvl: "든든", n: "저녁 — 성산흑돼지두루치기", note: "두루치기 (성산, 종달서 가까움)", lat: 33.4661167, lng: 126.9347917, alt: "대체: 윌라라 피쉬앤칩스" },
    ],
  },
];

// 동선상 미배정 — 취향따라 교체할 후보들
const EXTRAS = [
  { grp: "🌊 물놀이 대체 (메인 물놀이 장소 바꾸고 싶을 때)", items: ["서부: 판포포구 · 월령포구 · 황우치 · 하모", "동부: 하도 · 신흥(함덕) · 평대 · 소금막", "성산·남부 핫플: 표선해비치 · 광치기(일출) · 화순금모래"] },
  { grp: "🍴 라이트 — 아침·점심용", items: ["중문생선구이 (생선구이)", "공천포식당 (된장 물회)", "옛날순대 (순대국밥)", "유달 (짱개)", "산지해장국 (소고기 해장국)", "파도식당 (고기국수)"] },
  { grp: "🍴 든든 — 저녁용", items: ["삼남매식당 (막창전골)", "상록식당 (양념돼지고기)", "들렁모루 (오리탕)", "윌라라 (피쉬앤칩스)"] },
];

/* ---------- 방문 순서 번호 (지도와 무관하게 먼저 부여) ---------- */
DAYS.forEach((day) => {
  let order = 0;
  day.stops.forEach((s) => { if (s.k === "p") s._order = ++order; });
});

/* ---------- 지도 (Leaflet 로드 실패해도 일정표는 보이도록 가드) ---------- */
const hasLeaflet = typeof L !== "undefined" && L && typeof L.map === "function";
let map = null;
const dayLayers = {};

function showMapError() {
  const el = document.getElementById("map");
  if (el) el.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;color:#6b7785;font-size:.95rem;line-height:1.7">🗺️ 지도를 불러오지 못했어요.<br>인터넷에 연결한 뒤 새로고침하면 지도가 표시됩니다.<br><span style="font-size:.82rem;color:#9aa6b2">(인터넷이 없어도 일정표·길찾기 버튼은 그대로 사용할 수 있어요)</span></div>';
}

if (hasLeaflet) {
 try {
  map = L.map("map").setView([33.38, 126.55], 10);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19, attribution: "&copy; OpenStreetMap contributors",
  }).addTo(map);
  L.control.scale({ imperial: false, position: "bottomleft" }).addTo(map);

  const homeIcon = L.divIcon({
    className: "",
    html: `<div style="width:30px;height:30px;border-radius:50% 50% 50% 0;background:#2d3436;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:14px">🏠</span></div>`,
    iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -28],
  });
  L.marker([HOME.lat, HOME.lng], { icon: homeIcon }).addTo(map)
    .bindPopup(`<b>🏠 ${HOME.n}</b><br>모든 날의 출발·복귀 지점`);

  const numIcon = (num, color) => L.divIcon({
    className: "",
    html: `<div class="num-marker" style="width:26px;height:26px;background:${color}">${num}</div>`,
    iconSize: [26, 26], iconAnchor: [13, 13], popupAnchor: [0, -13],
  });
  const forkIcon = (color) => L.divIcon({
    className: "",
    html: `<div style="width:24px;height:24px;border-radius:50% 50% 50% 0;background:#fff;border:2px solid ${color};transform:rotate(-45deg);box-shadow:0 2px 4px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:12px">🍴</span></div>`,
    iconSize: [24, 24], iconAnchor: [12, 24], popupAnchor: [0, -22],
  });

  DAYS.forEach((day) => {
    const layer = L.layerGroup();
    const routePts = [[HOME.lat, HOME.lng]];
    day.stops.forEach((s) => {
      if (s.k === "p") {
        const m = L.marker([s.lat, s.lng], { icon: numIcon(s._order, day.color) });
        m.bindPopup(
          `<span class="pop-cat" style="background:${day.color}">${day.label} · ${s._order}번</span><br>` +
          `<b>${s.e} ${s.n}</b><br><span style="color:#666;font-size:.8rem">${s.note}</span><br>` +
          `<a href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}" target="_blank">길찾기 →</a>`
        );
        s._marker = m; layer.addLayer(m);
        routePts.push([s.lat, s.lng]);
      } else if (s.k === "meal" && s.lat) {
        const m = L.marker([s.lat, s.lng], { icon: forkIcon(day.color) });
        m.bindPopup(
          `<span class="pop-cat" style="background:${day.color}">🍴 ${s.n.split("—")[0].trim()}</span><br>` +
          `<b>${s.n.split("—")[1].trim()}</b>${s.note ? "<br><span style='color:#666;font-size:.8rem'>" + s.note + "</span>" : ""}<br>` +
          `<a href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}" target="_blank">길찾기 →</a>`
        );
        s._marker = m; layer.addLayer(m);
        routePts.push([s.lat, s.lng]);
      }
    });
    routePts.push([HOME.lat, HOME.lng]);
    L.polyline(routePts, { color: day.color, weight: 3, opacity: .5, dashArray: "6,9" }).addTo(layer);
    dayLayers[day.key] = layer;
  });
 } catch (err) {
  map = null;
  showMapError();
 }
} else {
  showMapError();
}

/* ---------- 사이드바 ---------- */
const tabsEl = document.getElementById("tabs");
const daysEl = document.getElementById("days");
const dayCards = {};

function makeTab(key, label, sub, color) {
  const t = document.createElement("div");
  t.className = "tab"; t.dataset.key = key; t.dataset.color = color || "#ff6b6b";
  t.innerHTML = `${label}<small>${sub}</small>`;
  t.onclick = () => select(key);
  tabsEl.appendChild(t);
}
makeTab("전체", "전체", "3일 동선", "#ff6b6b");
DAYS.forEach((d) => makeTab(d.key, d.label, d.stops.filter(s => s.k === "p").length + "곳", d.color));

DAYS.forEach((day) => {
  const card = document.createElement("div");
  card.className = "daycard";
  let html = `<div class="dayhead"><span class="daypill" style="background:${day.color}">${day.label}</span><span class="daysub">${day.sub}</span></div>`;
  day.stops.forEach((s) => {
    if (s.k === "meal") {
      const clickable = s.lat ? ` clk" data-day="${day.key}" data-meal="${s.t}` : "";
      const lvlCls = s.lvl === "든든" ? "heavy" : s.lvl === "간식" ? "snack" : "light";
      const lvlTag = s.lvl ? `<span class="lvl ${lvlCls}">${s.lvl}</span>` : "";
      html += `<div class="stop"><div class="time">${s.t}</div><div class="rail"><div class="meal-ico">${s.lvl === "간식" ? "🍢" : "🍴"}</div><div class="line"></div></div>` +
        `<div class="card"><div class="meal${clickable}">${lvlTag}<b>${s.n}</b>${s.note ? " · " + s.note : ""}${s.alt ? `<span class="alt">↳ ${s.alt}</span>` : ""}</div></div></div>`;
    } else {
      const swimTag = s.main ? `<span class="swim-badge">🌊 물놀이 2h</span>` : "";
      html += `<div class="stop"><div class="time">${s.t}</div><div class="rail"><div class="num" style="background:${day.color}">${s._order}</div><div class="line"></div></div>` +
        `<div class="card"><div class="place-card" data-day="${day.key}" data-order="${s._order}">` +
        `<div class="pc-top"><span class="pc-cat" style="background:${day.color}">${s.e} ${s.cat}</span><span class="pc-name">${s.n}</span>${swimTag}</div>` +
        `<div class="pc-note">${s.note}</div>` +
        `<a class="pc-dir" href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}" target="_blank" onclick="event.stopPropagation()">길찾기 →</a>` +
        `</div></div></div>`;
    }
  });
  card.innerHTML = html;
  daysEl.appendChild(card);
  dayCards[day.key] = card;
});

// extras
const extrasEl = document.getElementById("extras");
let ex = `<h3>🍴 미배정 맛집 후보 <span style="font-weight:400;color:var(--muted);font-size:.78rem">(이번 동선과 떨어짐)</span></h3>`;
EXTRAS.forEach((g) => {
  ex += `<div class="grp">${g.grp}</div>`;
  g.items.forEach((it) => { ex += `<div class="it">${it}</div>`; });
});
extrasEl.innerHTML = ex;

// 클릭 → 지도 이동
function flyToStop(day, pred) {
  const s = day.stops.find(pred);
  if (!s || !map || !s._marker) return;
  map.flyTo([s.lat, s.lng], 14, { duration: .6 });
  s._marker.openPopup();
}
daysEl.querySelectorAll(".place-card").forEach((el) => {
  el.onclick = () => flyToStop(DAYS.find((d) => d.key === el.dataset.day), (x) => x.k === "p" && x._order == el.dataset.order);
});
daysEl.querySelectorAll(".meal.clk").forEach((el) => {
  el.onclick = () => flyToStop(DAYS.find((d) => d.key === el.dataset.day), (x) => x.k === "meal" && x.t === el.dataset.meal);
});

/* ---------- 탭 선택 ---------- */
function select(key) {
  tabsEl.querySelectorAll(".tab").forEach((t) => {
    const on = t.dataset.key === key;
    t.classList.toggle("active", on);
    t.style.background = on ? t.dataset.color : "#fff";
  });
  DAYS.forEach((d) => { dayCards[d.key].style.display = (key === "전체" || d.key === key) ? "" : "none"; });
  if (!map) return;
  Object.keys(dayLayers).forEach((k) => map.removeLayer(dayLayers[k]));
  const shown = [];
  if (key === "전체") DAYS.forEach((d) => { if (dayLayers[d.key]) { dayLayers[d.key].addTo(map); shown.push(d.key); } });
  else if (dayLayers[key]) { dayLayers[key].addTo(map); shown.push(key); }
  const pts = [[HOME.lat, HOME.lng]];
  shown.forEach((k) => DAYS.find((d) => d.key === k).stops.forEach((s) => { if (s.lat) pts.push([s.lat, s.lng]); }));
  if (pts.length > 1) map.fitBounds(pts, { padding: [45, 45] });
}
select("전체");
</script>
